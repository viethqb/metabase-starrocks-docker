info:
  name: Metabase StarRocks Driver
  version: 1.0.0-SNAPSHOT
  description: Allows Metabase to connect to StarRocks databases with support for connection impersonation via EXECUTE AS.
driver:
  name: starrocks
  display-name: StarRocks
  lazy-load: true
  parent: mysql
  connection-properties:
    - group:
        container-style: ["grid", "3fr 1fr"]
        fields:
          - merge:
              - host
              - placeholder: starrocks-fe.example.com
                required: true
          - merge:
              - port
              - default: 9030
                placeholder: 9030
    - merge:
        - dbname
        - name: db
          placeholder: default_catalog.information_schema
          required: false
    - user
    - password
    - group:
        container-style: ["component", "backdrop"]
        fields:
          - ssl
          - ssh-tunnel
    - advanced-options-start
    - merge:
        - additional-options
        - placeholder: 'useCompression=true'
    - default-advanced-options
init:
  - step: load-namespace
    namespace: metabase.driver.mysql
  - step: load-namespace
    namespace: metabase.driver.starrocks
