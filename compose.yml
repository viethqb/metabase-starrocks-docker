name: metabase-starrocks

services:
  # ---------- Metabase app DB (Postgres) ----------
  postgres:
    image: postgres:16
    container_name: mb-postgres
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [sr]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 5s
      retries: 20

  # ---------- StarRocks FE (MySQL protocol port 9030) ----------
  starrocks-fe:
    image: viet1846/starrocks-fe-ubuntu:4.0-latest
    container_name: mb-starrocks-fe
    hostname: mb-starrocks-fe
    command:
      - /bin/bash
      - -c
      - |
        /opt/starrocks/fe_entrypoint.sh mb-starrocks-fe
    environment:
      HOST_TYPE: FQDN
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "8030:8030"
      - "9020:9020"
      - "9030:9030"
    volumes:
      - sr_fe_data:/opt/starrocks/fe/meta
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/health"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [sr]

  # ---------- StarRocks BE ----------
  starrocks-be:
    image: starrocks/be-ubuntu:4.0-latest
    container_name: mb-starrocks-be
    hostname: mb-starrocks-be
    command:
      - /bin/bash
      - -c
      - |
        /opt/starrocks/be_entrypoint.sh mb-starrocks-fe
    environment:
      HOST_TYPE: FQDN
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      - starrocks-fe
    volumes:
      - sr_be_data:/opt/starrocks/be/storage
    networks: [sr]

  # ---------- Metabase (built from source with StarRocks driver) ----------
  metabase:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        METABASE_REPO: ${METABASE_REPO:-https://github.com/metabase/metabase.git}
        METABASE_REF: ${METABASE_REF:-master}
        MB_EDITION: ${MB_EDITION:-ee}
    image: metabase-starrocks:local
    container_name: mb-app
    depends_on:
      postgres:
        condition: service_healthy
      starrocks-fe:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase_secret
      MB_DB_HOST: postgres
      MB_PLUGINS_DIR: /plugins
      JAVA_TIMEZONE: Asia/Ho_Chi_Minh
    ports:
      - "3002:3000"
    networks: [sr]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  sr_fe_data:
  sr_be_data:

networks:
  sr:
